<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Erick Gutierrez</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #000;
    --muted: #3a3a3a;
    --soft: #666;
    --light: #bbb;
    --white: #fff;
    --admin: #9a7c58;
    --gap: 8px;
  }
  html {
    scroll-behavior: smooth;
    -webkit-text-size-adjust: 100%;
    scroll-snap-type: y proximity;
  }
  body {
    background: var(--bg);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: normal;
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  /* Premium scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

  /* Film grain overlay — cinematic texture across entire page */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.06;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    background-size: 200px 200px;
  }

  /* ═══════════════════════════════════════
     MOBILE LAYOUT
  ═══════════════════════════════════════ */

  /* ── LEFT STRIP ──
     Fixed so it always renders above the fixed drawer panel.
     Right column compensates with margin-left.
  ── */
  .left-strip {
    width: 56px;
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-start;
    padding: 1.6rem 0 0 1rem;
    z-index: 40;
    overflow: visible;
    background: var(--bg);
  }

  /* Compensate for fixed left-strip */
  .shell {
    display: flex;
    min-height: 100vh;
    padding-left: 56px;
  }

  .right-col {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }

  .site-name-vertical {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-size: 1.2rem;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--white);
    white-space: nowrap;
    user-select: none;
    flex-shrink: 0;
    cursor: pointer;
  }
  /* Typewriter caret — blinks while typing, hides when done */
  .type-caret {
    display: inline-block;
    background: var(--white);
    animation: caret-blink 0.7s steps(2) infinite;
    margin-left: 2px;
    width: 1.5px;
    height: 0.85em;
    vertical-align: middle;
  }
  /* Caret inside vertical-writing name — rotated so it appears as a horizontal bar
     matching the bottom→top reading direction of the vertical text */
  .site-name-vertical .type-caret {
    width: 0.85em;
    height: 1.5px;
    margin-left: 0;
    margin-top: 2px;
    vertical-align: baseline;
  }
  .type-caret.hidden {
    display: none;
  }
  @keyframes caret-blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  /* Horizontal name for about page — top right corner */
  .site-name-horizontal {
    position: fixed;
    top: 1.6rem;
    right: 1.6rem;
    font-size: 1.2rem;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--white);
    white-space: nowrap;
    user-select: none;
    z-index: 110;
    display: none;
    cursor: pointer;
  }
  .site-name-horizontal.visible {
    display: block;
  }

  /* bottom anchor for the floating cat panel */
  .left-bottom {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0;
    width: 100%;
    position: relative;
  }

  /* ── FLOATING CAT PANEL ──
     Absolutely positioned above the hamburger.
     Grows from width:0 → target width (left → right).
     Never affects layout — floats above everything.
  ── */
  /* ── MOBILE DRAWER PANEL ──
     Uses GPU-accelerated transform for buttery smooth animation. */
  .mobile-drawer-panel {
    position: fixed;
    top: 0;
    bottom: 0;
    left: 56px;
    width: var(--drawer-w, 120px);
    background: var(--bg);
    z-index: 18;
    /* Hidden state: translated off-screen left */
    transform: translate3d(-100%, 0, 0);
    transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    pointer-events: none;
    will-change: transform;
  }
  .mobile-drawer-panel.open {
    transform: translate3d(0, 0, 0);
  }

  /* ── CATEGORY TEXT ── */
  .mobile-cats {
    position: fixed;
    bottom: calc(5rem + env(safe-area-inset-bottom));
    left: 1rem;
    overflow: visible;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
    pointer-events: none;
    z-index: 44;
    opacity: 0;
    transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .mobile-cats.open {
    opacity: 1;
    pointer-events: auto;
  }

  .cat-btn {
    background: transparent; border: none; text-align: left;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    font-weight: 300;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--soft);
    cursor: pointer;
    padding: 0.28rem 0;
    white-space: nowrap;
    opacity: 0;
    transform: translateY(8px);
    transition: color 0.3s cubic-bezier(0.22, 1, 0.36, 1),
                transform 0.2s cubic-bezier(0.22, 1, 0.36, 1);
    line-height: 1.2;
    pointer-events: none;
    -webkit-tap-highlight-color: transparent;
  }
  .cat-btn.active { color: var(--white); }
  .cat-btn:hover  { color: var(--white); }
  .cat-btn:active { transform: translateY(0) scale(0.96); }
  @keyframes catUp { to { opacity: 1; transform: translateY(0); } }

  /* ── FLOATING HAMBURGER ──
     Fixed to bottom of screen, floats above Safari browser bar */
  .left-hamburger {
    background: transparent; border: none;
    display: flex; flex-direction: column;
    align-items: flex-start; justify-content: center;
    gap: 5px; cursor: pointer; padding: 0;
    position: fixed;
    left: 0;
    width: 56px;
    padding-left: 1rem;
    bottom: calc(2rem + env(safe-area-inset-bottom));
    z-index: 45;
    -webkit-tap-highlight-color: transparent;
  }
  .left-hamburger span {
    display: block; height: 1.5px; background: var(--white);
    transition: width 0.2s, transform 0.2s ease, opacity 0.15s;
    transform-origin: left center;
  }
  .left-hamburger span:nth-child(1) { width: 28px; }
  .left-hamburger span:nth-child(2) { width: 18px; }
  .left-hamburger span:nth-child(3) { width: 23px; }
  .left-hamburger:hover span        { width: 28px; }
  .left-hamburger.open span:nth-child(1) { width: 24px; transform: translateY(6.5px) rotate(45deg); }
  .left-hamburger.open span:nth-child(2) { opacity: 0; width: 0; }
  .left-hamburger.open span:nth-child(3) { width: 24px; transform: translateY(-6.5px) rotate(-45deg); }

  /* ── ADMIN BAR ── */
  .admin-bar {
    display: none;
    padding: 5px 0.8rem 5px 0;
    font-size: 0.64rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--admin); align-items: center; justify-content: space-between;
  }
  .admin-bar.visible { display: flex; }
  .admin-lock {
    background: transparent; border: none; color: var(--admin);
    font-family: 'Cormorant Garamond', serif; font-size: 0.64rem;
    letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; padding: 0;
  }

  /* ── FEED — asymmetric editorial layout ──
     Mobile: single column, photos at natural aspect ratio
     Desktop: 12-column grid that creates magazine-style rhythm */
  .feed {
    flex: 1;
    padding: 1.5rem 1rem 4rem 0;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    touch-action: pan-y;
  }
  @media (min-width: 768px) {
    .feed {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 1.5rem;
      padding: 2.5rem 3rem 5rem 0;
    }
  }
  @media (min-width: 1100px) {
    .feed {
      gap: 2rem;
      padding: 3rem 4rem 6rem 0;
    }
  }

  /* When menu opens: dim photos gently, no layout restructure */
  .feed.menu-open .photo-card {
    opacity: 0.4;
    pointer-events: none;
    transition: opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .feed.menu-open .photo-card.visible {
    opacity: 0.4;
  }

  /* ── PHOTO CARD ──
     Natural aspect ratio (set by inline style or layout class).
     Mobile: full-width single column.
     Desktop: positioned in asymmetric grid via classes. */
  .photo-card {
    position: relative;
    width: 100%;
    overflow: hidden;
    cursor: pointer;
    background: #0a0a0a;
    /* Scroll-triggered fade-in: starts hidden, IntersectionObserver adds .visible */
    opacity: 0;
    transform: translate3d(0, 20px, 0);
    transition: opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1),
                transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    /* Performance: skip rendering off-screen photos */
    content-visibility: auto;
    contain-intrinsic-size: auto 500px;
    /* Allow only vertical scroll touch interaction */
    touch-action: pan-y;
    -webkit-tap-highlight-color: transparent;
    /* Soft scroll snap on mobile only - desktop multi-col doesn't need it */
    scroll-snap-align: start;
    scroll-margin-top: 1rem;
  }
  @media (min-width: 768px) {
    .photo-card {
      scroll-snap-align: none;
    }
  }
  .photo-card.visible {
    opacity: 1;
    transform: translate3d(0, 0, 0);
  }
  /* Desktop grid placement classes — span columns to create rhythm */
  @media (min-width: 768px) {
    /* Hero: full 12 columns */
    .photo-card.span-full { grid-column: span 12; }
    /* Half: 6 columns */
    .photo-card.span-half { grid-column: span 6; }
    /* Third: 4 columns */
    .photo-card.span-third { grid-column: span 4; }
    /* Two-thirds: 8 columns */
    .photo-card.span-2-3 { grid-column: span 8; }
    /* Right-aligned in row */
    .photo-card.span-half-right { grid-column: 7 / span 6; }
    /* Default if no span class */
    .photo-card:not([class*="span-"]) { grid-column: span 6; }
  }
  /* Photo cards use natural aspect ratio via inline aspect-ratio attribute */
  .photo-card[data-aspect="landscape"] { aspect-ratio: 3 / 2; }
  .photo-card[data-aspect="portrait"]  { aspect-ratio: 2 / 3; }
  .photo-card[data-aspect="square"]    { aspect-ratio: 1 / 1; }
  /* Hover effect only on devices that can actually hover (desktop) */
  @media (hover: hover) {
    .photo-card.visible {
      transition: opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1),
                  transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .photo-card.visible:hover {
      transform: scale(1.005);
    }
  }
  /* Blurred placeholder background while image loads */
  .photo-card .placeholder {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    filter: blur(20px);
    transform: scale(1.1);
    transition: opacity 0.4s ease;
    z-index: 0;
  }
  .photo-card.loaded .placeholder {
    opacity: 0;
  }

  .photo-card img, .photo-card .swatch {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    position: relative;
    z-index: 1;
  }
  .photo-card img {
    opacity: 0;
    transition: opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .photo-card img.loaded {
    opacity: 1;
  }
  @media (hover: hover) {
    .photo-card img.loaded, .photo-card .swatch {
      transition: opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                  transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .photo-card:hover img.loaded, .photo-card:hover .swatch {
      transform: scale(1.03);
    }
  }
  .photo-overlay {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.85);
    opacity: 0;
    transition: opacity 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    display: flex;
    align-items: center;
    padding: 8px 12px;
    pointer-events: none;
    z-index: 2;
  }
  .photo-card:hover .photo-overlay { opacity: 1; }
  .photo-caption {
    font-size: 0.7rem; color: var(--white);
    font-weight: 300; letter-spacing: 0.07em; line-height: 1.35;
  }

  /* Admin overlay */
  .admin-overlay {
    display: none; position: absolute; inset: 0;
    background: rgba(0,0,0,0.92); flex-direction: column;
    align-items: stretch; justify-content: flex-end;
    padding: 10px; gap: 6px; z-index: 10;
  }
  .admin-mode .photo-card .admin-overlay { display: flex; }
  .admin-mode .photo-card { cursor: default; }
  .admin-caption-input {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    color: var(--white); font-family: 'Cormorant Garamond', serif;
    font-size: 0.8rem; letter-spacing: 0.04em;
    padding: 5px 8px; width: 100%; outline: none;
  }
  .admin-caption-input::placeholder { color: var(--muted); }
  .admin-cat-select {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    color: var(--light); font-family: 'Cormorant Garamond', serif;
    font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 5px 8px; width: 100%; outline: none; appearance: none; cursor: pointer;
  }
  .admin-cat-select option { background: #0a0a0a; }
  .admin-save-btn {
    background: rgba(154,124,88,0.15); border: 1px solid rgba(154,124,88,0.3);
    color: var(--admin); font-family: 'Cormorant Garamond', serif;
    font-size: 0.68rem; letter-spacing: 0.16em; text-transform: uppercase;
    padding: 5px 8px; cursor: pointer; width: 100%;
  }
  .photo-card.hidden { display: none; }

  /* Cover overlay — fixed left strip, covers full page height including scroll.
     Sits above scrolled content (footer, upload) but below the sticky left strip. */
  .left-strip-cover {
    position: fixed;
    top: 0;
    left: 0;
    width: 56px;
    height: 100%;
    min-height: 100vh;
    background: var(--bg);
    z-index: 19;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .left-strip-cover.active {
    opacity: 1;
  }
  .site-footer {
    padding: 0.8rem 0.8rem 2rem 0;
    display: flex; justify-content: space-between; align-items: center;
  }
  .footer-yr   { font-size: 0.64rem; color: var(--muted); letter-spacing: 0.06em; }
  /* When mobile menu open, push footer and upload behind the cover */
  body.menu-open .upload-area,
  body.menu-open .site-footer {
    position: relative;
    z-index: 0;
  }
  .upload-area { padding: 0.8rem 0.8rem 0.4rem 0; }
  .upload-label {
    display: inline-flex; align-items: center; gap: 7px;
    color: var(--muted); font-size: 0.66rem; letter-spacing: 0.2em;
    text-transform: uppercase; cursor: pointer; transition: color 0.2s;
    font-family: 'Cormorant Garamond', serif;
  }
  .upload-label:hover { color: var(--soft); }
  #file-input { display: none; }

  /* ═══════════════════════════════════════
     DESKTOP OVERRIDES
  ═══════════════════════════════════════ */
  @media (min-width: 768px) {
    .shell { padding-left: 160px; }
    .left-strip {
      width: 160px !important;
      padding: 2rem 0 2.5rem 2rem;
    }
    .site-name-vertical { font-size: 1.25rem; letter-spacing: 0.28em; }
    /* Panel starts at right edge of desktop left-strip */
    .mobile-drawer-panel { left: 160px !important; }
    .admin-bar   { padding: 5px 3rem 5px 0; }
    .upload-area { padding: 1.2rem 3rem 0.6rem 0; }
    .site-footer { padding: 0.8rem 3rem 2.5rem 0; }
  }
  @media (min-width: 1100px) {
    .shell { padding-left: 200px; }
    .left-strip { width: 200px !important; padding: 2.4rem 0 3rem 2.4rem; }
    .mobile-drawer-panel { left: 200px !important; }
    .admin-bar   { padding: 5px 4rem 5px 0; }
    .upload-area { padding: 1.4rem 4rem 0.8rem 0; }
    .site-footer { padding: 1rem 4rem 3rem 0; }
  }

  /* ═══════════════════════════════════════
     ABOUT PAGE
  ═══════════════════════════════════════ */
  .about-view {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    overflow: hidden;
  }
  .about-view.visible {
    opacity: 1;
    pointer-events: auto;
  }
  /* When about is open, prevent body scroll */
  body.about-open {
    overflow: hidden;
  }
  /* Hide hamburger and left strip while on about page */
  body.about-open .left-hamburger,
  body.about-open .left-strip,
  body.about-open .mobile-cats {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .about-content {
    text-align: center;
    padding: 2rem;
    max-width: 600px;
  }
  .about-text {
    font-size: 1.4rem;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--light);
    line-height: 1.5;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.3s,
                transform 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.3s;
  }
  .about-view.visible .about-text {
    opacity: 1;
    transform: translateY(0);
  }
  .about-sub {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-top: 2rem;
    opacity: 0;
    transition: opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.6s;
  }
  .about-view.visible .about-sub {
    opacity: 1;
  }
  .about-link {
    color: var(--soft);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: color 0.3s, border-bottom-color 0.3s;
  }
  .about-link:hover {
    color: var(--white);
    border-bottom-color: var(--soft);
  }
  /* Back button on about page — bottom-left, typed with persistent caret */
  .about-back {
    position: fixed;
    bottom: 8vh;
    left: 1.6rem;
    background: transparent;
    border: none;
    color: var(--light);
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.85rem;
    font-weight: 300;
    letter-spacing: 0.25em;
    text-transform: lowercase;
    cursor: pointer;
    padding: 0.6rem 0.8rem;
    z-index: 110;
    display: none;
    -webkit-tap-highlight-color: transparent;
    transition: color 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    min-height: 44px;
    min-width: 80px;
    text-align: left;
    white-space: nowrap;
  }
  .about-back:hover { color: var(--white); }
  .about-back.visible {
    display: inline-flex;
    align-items: center;
  }
  /* Persistent blinking caret inside back button */
  .about-back .back-caret {
    display: inline-block;
    width: 1.5px;
    height: 0.9em;
    background: var(--light);
    margin-left: 2px;
    vertical-align: middle;
    animation: caret-blink 0.7s steps(2) infinite;
  }
  .about-back:hover .back-caret {
    background: var(--white);
  }
  @media (min-width: 768px) {
    .about-back {
      bottom: 6vh;
      left: 2rem;
      font-size: 0.9rem;
    }
  }
  @media (min-width: 768px) {
    .about-text { font-size: 2.4rem; }
    .about-sub { font-size: 0.9rem; margin-top: 2.5rem; }
  }
  @media (min-width: 1100px) {
    .about-text { font-size: 2.8rem; }
  }

  /* ── LANDSCAPE ORIENTATION FIX ──
     On mobile landscape, the name + cats compete for vertical space.
     Shift cats to the right of the left strip so they don't overlap. */
  @media (max-height: 500px) and (orientation: landscape) {
    .mobile-cats {
      bottom: calc(2.5rem + env(safe-area-inset-bottom));
      left: 4.5rem;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 1.2rem;
      max-width: calc(100vw - 6rem);
    }
    .cat-btn {
      padding: 0.2rem 0;
    }
    .cat-btn.menu-about {
      margin-top: 0;
      margin-left: 0.5rem;
    }
  }
  .cat-btn.menu-about {
    margin-top: 1rem;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    color: var(--light);
    text-transform: lowercase;
    position: relative;
  }
  .cat-btn.menu-about::before {
    content: '→ ';
    color: var(--soft);
    margin-right: 0.3em;
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1),
                color 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    display: inline-block;
  }
  .cat-btn.menu-about:hover {
    color: var(--white);
  }
  .cat-btn.menu-about:hover::before {
    transform: translateX(4px);
    color: var(--white);
  }

<script>
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
const PASS_HASH = '1327816492da6cae9606b0eedd6b61222f73349d37ffac38e5c66938fcd9e872';

let adminMode = false, failCount = 0, lockUntil = 0, adminTimer = null;
let menuOpen  = false;
const ADMIN_TIMEOUT = 5 * 60 * 1000, LOCK_DURATION = 30 * 1000;
const isMobile = () => window.innerWidth < 768;

const hamburger  = document.getElementById('hamburger');
const mobileCats = document.getElementById('mobile-cats');
const catBtns    = [...document.querySelectorAll('.cat-btn')];
const feed       = document.getElementById('gallery');
const gallery    = feed;

const cover       = document.getElementById('left-strip-cover');
const drawerPanel = document.getElementById('mobile-drawer-panel');
let closeTimer = null;

// Measure one card width before grid changes so photos don't stretch
function measureCardWidth() {
  const card = feed.querySelector('.photo-card:not(.hidden)');
  if (card) {
    document.documentElement.style.setProperty('--card-w', card.getBoundingClientRect().width + 'px');
  }
}

// Measure drawer panel target width = 75% of one photo column
function measureDrawerWidth() {
  const card = feed.querySelector('.photo-card:not(.hidden)');
  const colW = card ? card.getBoundingClientRect().width : (feed.getBoundingClientRect().width / 2);
  document.documentElement.style.setProperty('--drawer-w', Math.round(colW * 0.75) + 'px');
}

// ── OPEN ──
function openMobileMenu() {
  if (menuOpen) return;
  menuOpen = true;

  // Cancel any pending close cleanup
  if (closeTimer) { clearTimeout(closeTimer); closeTimer = null; }

  // Measure before grid changes
  measureCardWidth();
  measureDrawerWidth();

  // Single animation frame for clean class swap
  requestAnimationFrame(() => {
    hamburger.classList.add('open');
    cover.classList.add('active');
    document.body.classList.add('menu-open');
    drawerPanel.classList.add('open');
    feed.classList.add('menu-open');
    mobileCats.classList.add('open');

    // Stagger cats bottom→top
    catBtns.forEach(btn => {
      btn.style.transition    = '';
      btn.style.animation     = 'none';
      btn.style.opacity       = '0';
      btn.style.transform     = 'translateY(8px)';
      btn.style.pointerEvents = 'none';
    });
    requestAnimationFrame(() => {
      const n = catBtns.length;
      catBtns.forEach((btn, i) => {
        const delay = 0.15 + (n - 1 - i) * 0.07;
        btn.style.animation     = `catUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) ${delay}s forwards`;
        btn.style.pointerEvents = 'auto';
      });
    });
  });
}

// ── CLOSE ──
function closeMobileMenu(fast) {
  if (!menuOpen) return;
  menuOpen = false;

  hamburger.classList.remove('open');
  cover.classList.remove('active');
  document.body.classList.remove('menu-open');

  // Collapse black panel
  drawerPanel.classList.remove('open');
  // Restore 2-col grid
  feed.classList.remove('menu-open');
  // Fade category panel out
  mobileCats.classList.remove('open');

  // Fade cat text out
  const dur = fast ? '0.12s' : '0.7s';
  catBtns.forEach(btn => {
    btn.style.pointerEvents = 'none';
    btn.style.animation     = 'none';
    btn.style.transition    = `opacity ${dur} cubic-bezier(0.22, 1, 0.36, 1), transform ${dur} cubic-bezier(0.22, 1, 0.36, 1)`;
    btn.style.opacity       = '0';
    btn.style.transform     = 'translateY(6px)';
  });

  // After fade, wipe inline styles so next open is clean
  const clearMs = fast ? 150 : 720;
  closeTimer = setTimeout(() => {
    if (!menuOpen) {
      catBtns.forEach(btn => {
        btn.style.transition = '';
        btn.style.animation  = '';
      });
    }
    closeTimer = null;
  }, clearMs);
}

// ── HAMBURGER — toggle on all screen sizes ──
hamburger.addEventListener('click', () => {
  menuOpen ? closeMobileMenu(false) : openMobileMenu();
});

// ── CAT SELECTION — only filter, menu stays open ──
mobileCats.addEventListener('click', e => {
  const btn = e.target.closest('.cat-btn');
  if (!btn || btn.id === 'admin-cat-btn' || btn.id === 'menu-about-btn') return;
  syncCatUI(btn.dataset.cat);
});

// ── FILTER ──
const currentCat = { value: 'all' };
function applyFilter() {
  document.querySelectorAll('.photo-card').forEach(c => {
    c.classList.toggle('hidden', currentCat.value !== 'all' && c.dataset.cat !== currentCat.value);
  });
}
function syncCatUI(cat) {
  currentCat.value = cat;
  catBtns.forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  applyFilter();
}

// ── SECRET ADMIN TRIGGER — tap name 5 times within 2 seconds ──
let secretTaps = 0, secretTimer = null;
function handleSecretTap() {
  secretTaps++;
  clearTimeout(secretTimer);
  if (secretTaps >= 5) {
    secretTaps = 0;
    if (adminMode) { lockAdmin(); return; }
    openPwModal();
    return;
  }
  secretTimer = setTimeout(() => { secretTaps = 0; }, 2000);
}
document.getElementById('secret-trigger').addEventListener('click', handleSecretTap);

// ── ADMIN ──
const pwModal = document.getElementById('pw-modal');
const pwInput = document.getElementById('pw-input');
const pwError = document.getElementById('pw-error');
function openPwModal() {
  pwInput.value = ''; pwInput.classList.remove('error'); pwError.textContent = '';
  pwModal.classList.add('open'); setTimeout(() => pwInput.focus(), 100);
}
function closePwModal() { pwModal.classList.remove('open'); }
document.getElementById('pw-cancel').addEventListener('click', closePwModal);
// Exit admin button (only visible in admin mode)
document.getElementById('admin-cat-btn').addEventListener('click', () => {
  lockAdmin();
});
async function tryUnlock() {
  const now = Date.now();
  if (now < lockUntil) { pwError.textContent = `Locked — try again in ${Math.ceil((lockUntil - now)/1000)}s`; return; }
  const hash = await sha256(pwInput.value.trim());
  if (hash === PASS_HASH) {
    failCount = 0; closePwModal(); enterAdmin();
  } else {
    failCount++;
    pwInput.classList.add('error');
    if (failCount >= 3) {
      lockUntil = Date.now() + LOCK_DURATION; failCount = 0;
      pwError.textContent = 'Too many attempts — locked for 30s';
    } else {
      pwError.textContent = `Incorrect (${3 - failCount} attempt${3 - failCount !== 1 ? 's' : ''} left)`;
    }
    pwInput.value = '';
  }
}
document.getElementById('pw-confirm').addEventListener('click', tryUnlock);
pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });
function enterAdmin() {
  adminMode = true; gallery.classList.add('admin-mode');
  document.getElementById('admin-bar').classList.add('visible');
  // Show the exit button in the cats panel
  const exitBtn = document.getElementById('admin-cat-btn');
  exitBtn.style.display = '';
  exitBtn.classList.add('active');
  resetAdminTimer();
}
function lockAdmin() {
  adminMode = false; gallery.classList.remove('admin-mode');
  document.getElementById('admin-bar').classList.remove('visible');
  // Hide exit button again
  const exitBtn = document.getElementById('admin-cat-btn');
  exitBtn.style.display = 'none';
  exitBtn.classList.remove('active');
  clearTimeout(adminTimer);
}
document.getElementById('admin-lock').addEventListener('click', lockAdmin);
function resetAdminTimer() { clearTimeout(adminTimer); adminTimer = setTimeout(lockAdmin, ADMIN_TIMEOUT); }
document.addEventListener('touchstart', () => { if (adminMode) resetAdminTimer(); }, { passive: true });
gallery.addEventListener('click', e => {
  const s = e.target.closest('.admin-save-btn');
  if (s && adminMode) {
    const card = s.closest('.photo-card');
    card.dataset.caption = card.querySelector('.admin-caption-input').value.trim();
    card.dataset.cat     = card.querySelector('.admin-cat-select').value;
    card.querySelector('.photo-caption').textContent = card.dataset.caption;
    applyFilter();
    s.textContent = 'Saved';
    setTimeout(() => { s.textContent = 'Save'; }, 1200);
  }
});

// ── LIGHTBOX ──
const lb      = document.getElementById('lightbox');
const lbSlide = document.getElementById('lb-slide');
const lbCap   = document.getElementById('lb-cap');
const lbDate  = document.getElementById('lb-date');
let lbIdx = 0, lbCards = [];

function getVis() { return [...document.querySelectorAll('.photo-card:not(.hidden)')]; }
function renderSlide(card, el) {
  el.innerHTML = '';
  const img = card.querySelector('img');
  const sw  = card.querySelector('.swatch');
  if (img && img.src && !img.src.endsWith('#')) {
    const i = document.createElement('img');
    i.src = img.src; i.alt = img.alt || ''; el.appendChild(i);
  } else {
    const d = document.createElement('div');
    d.className = 'lb-swatch'; d.style.cssText = sw.style.cssText; el.appendChild(d);
  }
  lbCap.textContent  = card.dataset.caption || '';
  lbDate.textContent = card.dataset.date    || '';
}
function openLb(card) {
  lbCards = getVis(); lbIdx = lbCards.indexOf(card);
  renderSlide(card, lbSlide);
  lbSlide.style.transition = lbSlide.style.transform = lbSlide.style.opacity = '';
  lbScale = 1; lbPanX = 0; lbPanY = 0;
  lb.classList.add('open'); document.body.style.overflow = 'hidden';
}
function closeLb() {
  lb.classList.remove('open'); document.body.style.overflow = '';
  lb.style.transform = lb.style.opacity = '';
}
function navigateLb(dir) {
  // Premium crossfade: fade out, swap content, fade in
  // Reset any leftover transform from drag before fading
  lbSlide.style.transform = 'translateX(0)';
  lbSlide.style.transition = 'opacity 0.32s cubic-bezier(0.22, 1, 0.36, 1)';
  lbSlide.style.opacity    = '0';
  lbIdx = (lbIdx + dir + lbCards.length) % lbCards.length;
  setTimeout(() => {
    renderSlide(lbCards[lbIdx], lbSlide);
    // Ensure transform is reset for the new content
    lbSlide.style.transform = 'translateX(0)';
    lbSlide.style.opacity = '0';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      lbSlide.style.opacity = '1';
    }));
  }, 320);
}
document.getElementById('lb-close').onclick = closeLb;
lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
gallery.addEventListener('click', e => {
  if (adminMode) return;
  const c = e.target.closest('.photo-card');
  if (c) openLb(c);
});

// ── LIGHTBOX TOUCH — swipe to navigate + pinch to zoom + pan when zoomed ──
let swipeX = 0, swipeY = 0, swiping = false;
let lbScale = 1, lbPanX = 0, lbPanY = 0;
let pinchStartDist = 0, pinchStartScale = 1;
let panStartX = 0, panStartY = 0, panStartPanX = 0, panStartPanY = 0;
let isPinching = false;

function getLbImg() {
  return lbSlide.querySelector('img');
}

function applyImgTransform(scale, panX, panY, animated) {
  const img = getLbImg();
  if (!img) return;
  if (animated) {
    img.style.transition = 'transform 0.25s ease';
  } else {
    img.style.transition = 'none';
  }
  img.style.transform = `scale(${scale}) translate(${panX}px, ${panY}px)`;
  lbSlide.classList.toggle('zoomed', scale > 1);
}

function resetZoom(animated) {
  lbScale = 1; lbPanX = 0; lbPanY = 0;
  applyImgTransform(1, 0, 0, animated);
  lbSlide.classList.remove('zoomed', 'panning');
}

function getTouchDist(t1, t2) {
  const dx = t1.clientX - t2.clientX;
  const dy = t1.clientY - t2.clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

lb.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    // Pinch start
    isPinching = true;
    swiping = false;
    pinchStartDist  = getTouchDist(e.touches[0], e.touches[1]);
    pinchStartScale = lbScale;
    e.preventDefault();
  } else if (e.touches.length === 1) {
    isPinching = false;
    if (lbScale > 1) {
      // Pan mode
      panStartX    = e.touches[0].clientX;
      panStartY    = e.touches[0].clientY;
      panStartPanX = lbPanX;
      panStartPanY = lbPanY;
      lbSlide.classList.add('panning');
    } else {
      // Swipe mode
      swipeX = e.touches[0].clientX;
      swipeY = e.touches[0].clientY;
      swiping = true;
      lbSlide.style.transition = 'none';
    }
  }
}, { passive: false });

lb.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 2 && isPinching) {
    // Pinch zoom
    const dist = getTouchDist(e.touches[0], e.touches[1]);
    const newScale = Math.min(Math.max(pinchStartScale * (dist / pinchStartDist), 1), 4);
    lbScale = newScale;
    applyImgTransform(lbScale, lbPanX, lbPanY, false);
  } else if (e.touches.length === 1) {
    if (lbScale > 1) {
      // Pan
      const dx = e.touches[0].clientX - panStartX;
      const dy = e.touches[0].clientY - panStartY;
      lbPanX = panStartPanX + dx / lbScale;
      lbPanY = panStartPanY + dy / lbScale;
      applyImgTransform(lbScale, lbPanX, lbPanY, false);
    } else if (swiping) {
      // Swipe navigation
      const dx = e.touches[0].clientX - swipeX;
      const dy = e.touches[0].clientY - swipeY;
      if (Math.abs(dx) >= Math.abs(dy)) {
        lbSlide.style.transform = `translateX(${dx}px)`;
        lbSlide.style.opacity   = String(Math.max(0, 1 - Math.abs(dx) / (window.innerWidth * 1.2)));
      } else if (dy > 0) {
        lb.style.transform = `translateY(${dy * 0.4}px)`;
        lb.style.opacity   = String(Math.max(0, 1 - dy / (window.innerHeight * 0.8)));
      }
    }
  }
}, { passive: false });

lb.addEventListener('touchend', e => {
  lbSlide.classList.remove('panning');

  if (isPinching && e.touches.length < 2) {
    isPinching = false;
    // Snap back to 1 if pinched below threshold
    if (lbScale < 1.05) resetZoom(true);
    return;
  }

  if (lbScale > 1) return; // Don't navigate while zoomed

  if (!swiping) return;
  swiping = false;

  const dx = e.changedTouches[0].clientX - swipeX;
  const dy = e.changedTouches[0].clientY - swipeY;
  lb.style.transform = lb.style.opacity = '';

  if (Math.abs(dx) >= Math.abs(dy)) {
    if (Math.abs(dx) > 50) {
      // Reset slide position/opacity before navigation so new photo isn't cut off
      lbSlide.style.transition = 'none';
      lbSlide.style.transform = 'translateX(0)';
      lbSlide.style.opacity = '1';
      navigateLb(dx < 0 ? 1 : -1);
      resetZoom(false);
    }
    else {
      lbSlide.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
      lbSlide.style.transform  = 'translateX(0)'; lbSlide.style.opacity = '1';
    }
  } else if (dy > 90) { closeLb(); resetZoom(false); }
  else {
    lbSlide.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
    lbSlide.style.transform  = 'translateX(0)'; lbSlide.style.opacity = '1';
  }
}, { passive: true });

// Double tap to reset zoom
let lastTap = 0;
lb.addEventListener('touchend', e => {
  if (e.touches.length > 0) return;
  const now = Date.now();
  if (now - lastTap < 300) {
    if (lbScale > 1) { resetZoom(true); }
    else {
      lbScale = 2.5; lbPanX = 0; lbPanY = 0;
      applyImgTransform(lbScale, 0, 0, true);
    }
  }
  lastTap = now;
}, { passive: true });

// Reset zoom when navigating
const origNavigateLb = navigateLb;
function navigateLbWithReset(dir) {
  resetZoom(false);
  origNavigateLb(dir);
}
document.getElementById('lb-prev').onclick = () => navigateLbWithReset(-1);
document.getElementById('lb-next').onclick = () => navigateLbWithReset(1);

// ═══════════════════════════════════════════════════════════════
// PREMIUM FEATURES
// ═══════════════════════════════════════════════════════════════

// ── 1. TYPEWRITER NAME ──
// Types "Erick Gutierrez" character by character into the vertical name
// on first load. Once typed, caret blinks 2 more times then hides.
// Uses sessionStorage so it only runs once per session — refresh shows complete.
const NAME = 'Erick Gutierrez';
const nameText      = document.getElementById('name-text');
const typeCaret     = document.getElementById('type-caret');
const nameHorizontal= document.getElementById('name-horizontal');
const nameHText     = document.getElementById('name-horizontal-text');
const typeCaretH    = document.getElementById('type-caret-h');

function typeInto(el, caret, text, charDelay = 90, onDone) {
  el.textContent = '';
  caret.classList.remove('hidden');
  let i = 0;
  function tick() {
    if (i <= text.length) {
      el.textContent = text.slice(0, i);
      i++;
      setTimeout(tick, charDelay);
    } else {
      // Let caret blink for ~1.4s after typing finishes, then hide
      setTimeout(() => {
        caret.classList.add('hidden');
        if (onDone) onDone();
      }, 1400);
    }
  }
  setTimeout(tick, 200);
}

function deleteFrom(el, caret, onDone, charDelay = 25) {
  caret.classList.remove('hidden');
  let text = el.textContent;
  function tick() {
    if (text.length > 0) {
      text = text.slice(0, -1);
      el.textContent = text;
      setTimeout(tick, charDelay);
    } else {
      if (onDone) onDone();
    }
  }
  setTimeout(tick, 80);
}

// On first load, type. Subsequent loads in same session show complete.
if (!sessionStorage.getItem('nameTyped')) {
  typeInto(nameText, typeCaret, NAME, 90, () => {
    sessionStorage.setItem('nameTyped', '1');
  });
} else {
  nameText.textContent = NAME;
  typeCaret.classList.add('hidden');
}

// ── 2. SCROLL-TRIGGERED FADE-INS ──
// Each photo card fades in when entering viewport. Once per load (no repeat).
const fadeObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      fadeObserver.unobserve(entry.target);
    }
  });
}, {
  rootMargin: '0px 0px -50px 0px',
  threshold: 0.05
});
document.querySelectorAll('.photo-card').forEach(card => {
  fadeObserver.observe(card);
});

// ── 3. BLURRED PLACEHOLDERS ──
// Wraps each img with a low-res blurred version that loads instantly,
// then crossfades to the full image. Uses Cloudinary URL transforms for blur.
function setupPlaceholders() {
  document.querySelectorAll('.photo-card').forEach(card => {
    const img = card.querySelector('img');
    if (!img || !img.src) return;

    // Build blur URL for Cloudinary images
    let blurUrl = null;
    if (img.src.includes('res.cloudinary.com')) {
      // Insert /e_blur:2000,q_10,w_50/ after /upload/
      blurUrl = img.src.replace('/upload/', '/upload/e_blur:2000,q_10,w_50/');
    }

    if (blurUrl) {
      const placeholder = document.createElement('div');
      placeholder.className = 'placeholder';
      placeholder.style.backgroundImage = `url("${blurUrl}")`;
      card.insertBefore(placeholder, img);
    }

    // Fade in when fully loaded
    if (img.complete && img.naturalHeight !== 0) {
      img.classList.add('loaded');
      card.classList.add('loaded');
    } else {
      img.addEventListener('load', () => {
        img.classList.add('loaded');
        card.classList.add('loaded');
      });
      img.addEventListener('error', () => {
        // If image fails, still show whatever placeholder exists
        img.classList.add('loaded');
        card.classList.add('loaded');
      });
    }
  });
}
setupPlaceholders();

// ── 5. ABOUT PAGE TOGGLE ──
const aboutView = document.getElementById('about-view');
const menuAboutBtn = document.getElementById('menu-about-btn');
const leftStrip = document.getElementById('left-strip');
let aboutOpen = false;

function openAbout() {
  if (aboutOpen) return;
  aboutOpen = true;
  menuAboutBtn.classList.add('active');
  document.body.classList.add('about-open');

  // Close the menu first
  closeMobileMenu(true);

  // Quick transition - users want to see /about fast
  setTimeout(() => {
    // Delete the vertical name (fast)
    deleteFrom(nameText, typeCaret, () => {
      // Hide the left strip name area
      leftStrip.style.opacity = '0';
      leftStrip.style.transition = 'opacity 0.3s ease';

      // Show horizontal name container, then type into it
      nameHorizontal.classList.add('visible');
      typeInto(nameHText, typeCaretH, NAME, 70);

      // Show about view
      aboutView.classList.add('visible');
      // Show back button and type "← back" — caret keeps blinking forever
      aboutBack.classList.add('visible');
      typeBackButton();
    }, 25);
  }, 150);
}

// Type "← back" into back button — caret never hides (keeps blinking)
function typeBackButton() {
  const backText = document.getElementById('back-text');
  backText.textContent = '';
  const fullText = '← back';
  let i = 0;
  function tick() {
    if (i <= fullText.length) {
      backText.textContent = fullText.slice(0, i);
      i++;
      setTimeout(tick, 80);
    }
  }
  setTimeout(tick, 400); // small pause after about view appears
}

function closeAbout() {
  if (!aboutOpen) return;
  aboutOpen = false;
  menuAboutBtn.classList.remove('active');
  document.body.classList.remove('about-open');

  // Hide about view and back button first
  aboutView.classList.remove('visible');
  aboutBack.classList.remove('visible');
  // Clear back button text so it retypes fresh next time
  document.getElementById('back-text').textContent = '';

  setTimeout(() => {
    // Delete horizontal name (fast)
    deleteFrom(nameHText, typeCaretH, () => {
      nameHorizontal.classList.remove('visible');
      typeCaretH.classList.add('hidden');

      // Restore left strip
      leftStrip.style.opacity = '';

      // Re-type vertical name
      typeInto(nameText, typeCaret, NAME, 70);
    }, 25);
  }, 400);
}

const aboutBack = document.getElementById('about-back');

menuAboutBtn.addEventListener('click', () => {
  if (aboutOpen) closeAbout();
  else openAbout();
});

aboutBack.addEventListener('click', closeAbout);

// Tap anywhere on the about background (not on text/links) to close
aboutView.addEventListener('click', (e) => {
  // Only close if clicking the about-view background, not its children
  if (e.target === aboutView || e.target.classList.contains('about-content')) {
    closeAbout();
  }
});

// Also close about when any category is tapped
mobileCats.addEventListener('click', e => {
  const btn = e.target.closest('.cat-btn');
  if (!btn || btn.id === 'menu-about-btn' || btn.id === 'admin-cat-btn') return;
  // If on about page, close it first then filter
  if (aboutOpen) closeAbout();
});

// Tapping horizontal name returns to portfolio
nameHorizontal.addEventListener('click', () => {
  if (aboutOpen) closeAbout();
});
</script>
